services:
  alphaloop-market-data-local:
    container_name: alphaloop-market-data-local
    restart: unless-stopped
    image: alphaloop-market-data:local
    environment:
      DEPLOYMENT_TYPE: local
      DATABASE_URL: ${DATABASE_URL}
      CLOUD_API_URL: ${CLOUD_API_URL}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      MARKET_DATA_INTERVAL: ${MARKET_DATA_INTERVAL:-10}
      MARKET_DATABASE: ${MARKET_DATABASE:-alphaloop_market}
      CLOUD_SYNC_ENABLED: ${CLOUD_SYNC_ENABLED:-true}
      CLOUD_SYNC_INTERVAL: ${CLOUD_SYNC_INTERVAL:-300}
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.local
    volumes:
      - ${ALPHALOOP_HOME}/logs/:/app/logs/
      - ${ALPHALOOP_HOME}/cache/:/app/cache/
    ports:
      - "8001:8000"
    depends_on:
      alphaloop-database:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
