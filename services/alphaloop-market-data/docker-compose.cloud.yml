services:
  alphaloop-market-data-cloud:
    container_name: alphaloop-market-data-cloud
    restart: unless-stopped
    image: alphaloop-market-data:cloud
    environment:
      DEPLOYMENT_TYPE: cloud
      DATABASE_URL: ${DATABASE_URL}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      MARKET_DATA_INTERVAL: ${MARKET_DATA_INTERVAL:-10}
      MARKET_DATABASE: ${MARKET_DATABASE:-alphaloop_market}
      CLOUD_SYNC_ENABLED: ${CLOUD_SYNC_ENABLED:-false}
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.cloud
    volumes:
      - ${ALPHALOOP_HOME}/logs/:/app/logs/
    ports:
      - "8000:8000"
    depends_on:
      alphaloop-database:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
