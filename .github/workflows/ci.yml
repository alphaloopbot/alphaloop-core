name: CI

on:
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install Poetry
      uses: snok/install-poetry@v1
      with:
        version: latest
        virtualenvs-create: true
        virtualenvs-in-project: true

    - name: Load cached venv
      id: cached-poetry-dependencies
      uses: actions/cache@v3
      with:
        path: .venv
        key: venv-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('**/poetry.lock') }}

    - name: Install dependencies
      if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
      run: poetry install --no-interaction --no-root

    - name: Run linting
      run: poetry run ruff check .

    - name: Run type checking
      run: poetry run mypy src/alphaloop_core/ --ignore-missing-imports --disable-error-code=misc --disable-error-code=unused-ignore --disable-error-code=unreachable --disable-error-code=no-any-return --disable-error-code=dict-item --disable-error-code=attr-defined --disable-error-code=index --disable-error-code=var-annotated --disable-error-code=operator --disable-error-code=call-overload --disable-error-code=union-attr --disable-error-code=no-untyped-def --disable-error-code=safe-super

    - name: Run tests
      run: poetry run pytest tests/unit/ -v

    - name: Run integration tests
      run: poetry run pytest tests/integration/ -v
      env:
        DATABASE_URL: postgresql://postgres:password@localhost:5432/test_alphaloop

  conda-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install Miniconda
      uses: conda-incubator/setup-miniconda@v3
      with:
        auto-update-conda: true
        python-version: ${{ matrix.python-version }}

    - name: Create conda environment
      run: conda env create -f environment.yml

    - name: Activate conda environment and install project
      run: |
        conda init bash
        source ~/.bashrc
        conda activate alphaloop-core
        poetry install --no-interaction --no-root

    - name: Test conda environment
      run: |
        conda init bash
        source ~/.bashrc
        conda activate alphaloop-core
        python scripts/test_conda_env.py

    - name: Run tests in conda environment
      run: |
        conda init bash
        source ~/.bashrc
        conda activate alphaloop-core
        poetry run pytest tests/unit/ -v
