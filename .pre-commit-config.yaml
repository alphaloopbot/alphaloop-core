repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: debug-statements

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.7
    hooks:
      - id: ruff
        args: [--fix]
        description: "Lint and auto-fix Python code (imports, formatting, line length, etc.)"
      - id: ruff-format
        description: "Format Python code with consistent style"

  # Custom formatting script for additional fixes
  - repo: local
    hooks:
      - id: fix-formatting
        name: Fix formatting issues
        entry: python scripts/fix-formatting.py
        language: python
        types: [python]
        description: "Run custom formatting fixes for line length and other issues"

  # MyPy with smart filtering - ignores framework limitations, focuses on business logic
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        args: [--ignore-missing-imports, --disable-error-code=misc, --disable-error-code=unused-ignore, --disable-error-code=unreachable, --disable-error-code=no-any-return, --disable-error-code=dict-item, --disable-error-code=valid-type, --disable-error-code=type-arg, --disable-error-code=attr-defined, --disable-error-code=index, --disable-error-code=var-annotated, --disable-error-code=operator, --disable-error-code=union-attr, --disable-error-code=no-untyped-def]
        additional_dependencies: [types-requests, types-redis]
        exclude: ^(tests/|examples/)
